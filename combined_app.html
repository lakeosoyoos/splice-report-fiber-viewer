<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Splice Report + Trace + Topo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; color: #333; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; display: flex; }

#left { width: 45vw; height: 100vh; overflow-y: auto; overflow-x: auto; border-right: 2px solid #1F4E79; background: #fafafa; }
#left h2 { position: sticky; top: 0; z-index: 10; background: #1F4E79; color: #fff; padding: 6px 10px; font-size: 12px; margin: 0; }
#damage-table { width: 100%; border-collapse: collapse; font-size: 9px; font-family: 'Consolas', monospace; }
#damage-table th { background: #1F4E79; color: #fff; padding: 3px 5px; font-size: 8px; position: sticky; top: 28px; z-index: 5; text-align: center; border: 0.5px solid #163d5e; cursor: pointer; vertical-align: top; }
#damage-table th.bend-hdr { background: #FFD700; color: #5a4a00; }
#damage-table td { padding: 2px 4px; border: 0.5px solid #ddd; vertical-align: top; white-space: pre-line; line-height: 1.2; cursor: pointer; font-size: 8px; }
.ribbon-label { font-weight: 600; font-size: 9px; white-space: nowrap; cursor: pointer; background: #f0f4f8; }
.ribbon-label:hover { background: #d0e4f4; }
.ribbon-label.active { background: #1F4E79; color: #fff; }
.cell-break    { background: #FF4444; color: #fff; font-weight: bold; }
.cell-broke    { background: #FF8800; color: #fff; font-weight: bold; }
.cell-flagged  { background: #FFC7CE; }
.cell-bfill    { background: #BDD7EE; color: #1F4E79; }
.cell-a_only   { background: #FFF2CC; color: #7F6000; }
.cell-a_only_high { background: #FFD700; color: #4B3000; font-weight: bold; }
.cell-b_only   { background: #E8D5F5; color: #4B0082; }
.cell-b_only_high { background: #C084FC; color: #1A0033; font-weight: bold; }

#right { width: 55vw; height: 100vh; display: flex; flex-direction: column; }
#right-toolbar {
  display: flex; gap: 6px; padding: 5px 8px; flex-shrink: 0;
  background: #1C2526; border-bottom: 2px solid #E8461E;
}
.tc-btn {
  padding: 5px 14px; border: none; border-radius: 3px;
  background: #E8461E; color: #fff;
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-weight: 700; font-size: 11px; cursor: pointer; white-space: nowrap;
}
.tc-btn:hover { background: #c23610; }
.tc-btn-outline {
  padding: 4px 12px; border: 2px solid #E8461E; border-radius: 3px;
  background: transparent; color: #E8461E;
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-weight: 700; font-size: 11px; cursor: pointer; white-space: nowrap;
}
.tc-btn-outline:hover { background: rgba(232,70,30,0.15); }
#restore-btn {
  display: none; position: fixed; right: 0; top: 50%;
  transform: translateY(-50%); z-index: 200;
  background: #E8461E; color: #fff; border: none;
  padding: 16px 5px; cursor: pointer; font-size: 13px; font-weight: 700;
  border-radius: 4px 0 0 4px; writing-mode: vertical-rl; letter-spacing: 1px;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
#restore-btn:hover { background: #c23610; }
#top-panel { flex: 1; min-height: 0; position: relative; }
#bot-panel { display: none; }
#trace-canvas { width: 100%; height: 100%; }
#topo-3d { width: 100%; height: 100%; }

#controls {
  position: absolute; top: 4px; right: 4px; background: rgba(255,255,255,0.92); border: 1px solid #ccc;
  border-radius: 5px; padding: 6px 8px; font-size: 10px; z-index: 10; width: 150px;
}
#controls h3 { font-size: 10px; color: #1F4E79; margin-bottom: 3px; }
#controls .lbl { font-size: 9px; color: #888; margin: 3px 0 1px; }
#fiber-input { width: 100%; padding: 3px; border: 1px solid #ccc; border-radius: 2px; font-size: 10px; font-family: monospace; }
.btn { width: 100%; padding: 3px; margin: 2px 0; border: 1px solid #1F4E79; border-radius: 2px; background: #f0f4f8; color: #1F4E79; font-size: 9px; font-weight: bold; cursor: pointer; }
.btn:hover { background: #d0e4f4; }
#chart-info { font-size: 9px; color: #1F4E79; margin-top: 4px; font-weight: 600; }

#trace-tooltip, #topo-tooltip {
  position: absolute; display: none; background: rgba(255,255,255,0.95); border: 1px solid #1F4E79;
  border-radius: 3px; padding: 4px 7px; font-size: 10px; pointer-events: none; z-index: 20;
}

#loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: rgba(255,255,255,0.95); border: 1px solid #ccc; border-radius: 8px; padding: 20px 40px; z-index: 100; }
#loading h2 { color: #1F4E79; font-size: 14px; }
</style>
</head>
<body>
<div id="left">
  <h2 id="table-title">Splice Report</h2>
  <table id="damage-table"><thead><tr id="hdr-row"></tr></thead><tbody id="tbl-body"></tbody></table>
</div>
<div id="right">
  <div id="right-toolbar">
    <button class="tc-btn" onclick="popoutOpen()">⛶ Pop Out 2D</button>
    <button class="tc-btn-outline" id="collapse-btn" onclick="collapseToggle()">▶ Collapse 2D</button>
  </div>
  <div id="top-panel">
    <canvas id="trace-canvas"></canvas>
    <div id="trace-tooltip"></div>
    <div id="controls">
      <h3>Controls</h3>
      <div id="chart-info">Click a ribbon</div>
      <div class="lbl">Fiber #</div>
      <input type="text" id="fiber-input" placeholder="e.g. 49">
      <button class="btn" id="fiber-btn">Show Fiber</button>
      <button class="btn" id="ribbon-btn" style="border-color:#999;color:#666">Full Ribbon</button>
      <div class="lbl">2D Zoom (km)</div>
      <div style="display:flex;gap:3px">
        <input type="number" id="km-start" value="0" min="0" step="1" style="width:45px;padding:2px;border:1px solid #ccc;border-radius:2px;font-size:9px">
        <span style="color:#888;font-size:9px">to</span>

    <div id="topo-3d"></div>

<button id="restore-btn" onclick="collapseToggle()">◀ Expand 2D</button>
<div id="setup-screen" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#f8f9fa;z-index:200;display:flex;align-items:center;justify-content:center">
  <div style="background:#fff;border:1px solid #ccc;border-radius:12px;padding:30px 40px;max-width:500px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.1)">
    <h1 style="color:#1F4E79;font-size:20px;margin-bottom:8px">Splice Report Viewer</h1>
    <p style="color:#888;font-size:12px;margin-bottom:20px">Select A and B direction SOR folders to analyze</p>

    <div style="text-align:left;margin-bottom:15px">
      <div style="font-size:11px;color:#666;margin-bottom:3px">A-Direction folder:</div>
      <div style="display:flex;gap:6px">
        <input id="dir-a" readonly style="flex:1;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:11px;background:#f8f9fa" placeholder="Click Browse...">
        <button onclick="pickFolder('a')" style="padding:6px 12px;background:#1F4E79;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px">Browse</button>
      </div>

    <div style="text-align:left;margin-bottom:15px">
      <div style="font-size:11px;color:#666;margin-bottom:3px">B-Direction folder:</div>
      <div style="display:flex;gap:6px">
        <input id="dir-b" readonly style="flex:1;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:11px;background:#f8f9fa" placeholder="Click Browse...">
        <button onclick="pickFolder('b')" style="padding:6px 12px;background:#1F4E79;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px">Browse</button>
      </div>
    </div>

    <div style="display:flex;gap:10px;text-align:left;margin-bottom:20px">
      <div style="flex:1">
        <div style="font-size:11px;color:#666;margin-bottom:3px">Site A name:</div>

      </div>
      <div style="flex:1">
        <div style="font-size:11px;color:#666;margin-bottom:3px">Site B name:</div>
        <input id="site-b" value="B" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:11px">
      </div>
    </div>

    <button id="run-btn" onclick="runAnalysis()" style="width:100%;padding:10px;background:#1F4E79;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer">Analyze</button>
    <div id="setup-status" style="margin-top:10px;font-size:11px;color:#888"></div>

    <div style="margin-top:15px;border-top:1px solid #eee;padding-top:10px">
      <button id="load-existing-btn" onclick="loadExisting()" style="background:none;border:1px solid #ccc;border-radius:4px;padding:6px 12px;color:#666;font-size:11px;cursor:pointer">Load previous results</button>
    </div>
  </div>
</div>
<div id="loading" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,0.95);border:1px solid #ccc;border-radius:8px;padding:20px 40px;z-index:100"><h2 style="color:#1F4E79;font-size:14px">Extracting data...</h2><p id="loading-msg" style="font-size:11px;color:#888">This may take a minute</p></div>

<script>
// Folder picker bridge to pywebview
async function pickFolder(which) {
  try {
    const folder = await window.pywebview.api.select_folder(
      which === 'a' ? 'Select A-direction SOR folder' : 'Select B-direction SOR folder');
    if (folder) {
      document.getElementById('dir-' + which).value = folder;
      // Auto-detect site name from folder name
      const name = folder.split('/').pop();
      const input = document.getElementById('site-' + which);
      if (input.value === 'A' || input.value === 'B') {
        // Try to extract a short site code
        const match = name.match(/^([A-Z]{2,4})/i);
        if (match) input.value = match[1].toUpperCase();
      }
    }
  } catch (e) {
    document.getElementById('setup-status').textContent = 'Error: ' + e.message;
  }
}

async function runAnalysis() {
  const dirA = document.getElementById('dir-a').value;
  const dirB = document.getElementById('dir-b').value;
  const siteA = document.getElementById('site-a').value || 'A';
  const siteB = document.getElementById('site-b').value || 'B';
  if (!dirA || !dirB) {
    document.getElementById('setup-status').textContent = 'Please select both folders';
    return;
  }
  document.getElementById('run-btn').disabled = true;
  document.getElementById('run-btn').textContent = 'Extracting...';
  document.getElementById('setup-status').textContent = 'Running extraction — this may take a minute...';
  document.getElementById('loading').style.display = 'block';

  try {
    const result = await window.pywebview.api.run_extraction(dirA, dirB, siteA, siteB);
    if (result.status === 'ok') {
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('loading').style.display = 'none';
      loadDataAndStart();
    } else {
      document.getElementById('setup-status').textContent = 'Error: ' + result.message;
      document.getElementById('run-btn').disabled = false;
      document.getElementById('run-btn').textContent = 'Analyze';
      document.getElementById('loading').style.display = 'none';
    }
  } catch (e) {
    document.getElementById('setup-status').textContent = 'Error: ' + e.message;
    document.getElementById('run-btn').disabled = false;
    document.getElementById('run-btn').textContent = 'Analyze';
    document.getElementById('loading').style.display = 'none';
  }
}

async function loadExisting() {
  try {
    const hasData = await window.pywebview.api.has_data();
    if (hasData) {
      document.getElementById('setup-screen').style.display = 'none';
      loadDataAndStart();
    } else {
      document.getElementById('setup-status').textContent = 'No previous results found. Run an analysis first.';
    }
  } catch (e) {
    // Not running in pywebview — try loading from static file
    document.getElementById('setup-screen').style.display = 'none';
    loadDataAndStart();
  }
}
</script>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let data;
let currentRibbon = -1, currentFiber = -1, highlightKm = null;
let showBDir = false;
let compositeData = {};   // fnum -> [{km, avg, aDb, bDb}] — rebuilt each draw2D call
let scene, camera, renderer, controls, topoGroup;
let vScale = 1;
let zoomKmStart = null, zoomKmEnd = null;  // null = full span
let isDragging = false, dragStartX = 0, dragStartKmS = 0, dragStartKmE = 0;

function drawFiberHighlight(fnum, color) {
  const p = window._highlightParams;
  if (!p) return;
  const trace = data.fiber_traces?.[String(fnum)];
  if (!trace) return;
  // Draw directly on the canvas using the stored coordinate functions
  // The canvas is already scaled from draw2D — use ctx directly
  const canvas = document.getElementById('trace-canvas');
  const ctx2 = canvas.getContext('2d');
  const dpr = window.devicePixelRatio;
  ctx2.save();
  ctx2.setTransform(dpr, 0, 0, dpr, 0, 0);  // reset to clean DPR scale
  ctx2.strokeStyle = color;
  ctx2.lineWidth = p.lw;
  ctx2.beginPath();
  let started = false;
  for (const [km, db] of trace) {
    const x = p.kmToX(km);
    const y = p.dbToY(db);
    if (!started) { ctx2.moveTo(x, y); started = true; }
    else ctx2.lineTo(x, y);
  }
  ctx2.stroke();
  ctx2.restore();
}
let damageDots = [];  // [{x, y, r, text, color}] for hover detection

function getKmRange() {
  if (!data) return 75;
  let maxKm = 0;
  const fibers = currentFiber > 0 ? [currentFiber] :
    currentRibbon >= 0 ? Array.from({length: data.meta.ribbon_size}, (_, i) => data.ribbons[currentRibbon].f_start + i) : [];
  for (const f of fibers) {
    const t = data.fiber_traces?.[String(f)];
    if (t) { const last = t[t.length-1][0]; if (last > maxKm) maxKm = last; }
  }
  return maxKm || data.meta.span_km;
}

// ═══════════════════════════════════════════════════════════════════════════
// TABLE
// ═══════════════════════════════════════════════════════════════════════════
function ftStr(km) { return Math.round(km * 3280.84).toLocaleString() + ' ft'; }
function kmStr(km) { return km.toFixed(3) + ' km'; }

function buildTable() {
  const hdr = document.getElementById('hdr-row');
  const body = document.getElementById('tbl-body');
  const spanKm = data.meta.span_km;
  document.getElementById('table-title').textContent = `${data.meta.site_a} → ${data.meta.site_b}`;
  let h = '<th>Ribbon</th>';
  for (let si = 0; si < data.splices.length; si++) {
    const sp = data.splices[si];
    const cls = sp.is_bend ? ' class="bend-hdr"' : '';
    const abKm  = sp.km;
    const baKm  = spanKm - sp.km;
    const label = sp.is_bend ? 'Bend' : `S${sp.splice_num}`;
    h += `<th${cls} data-si="${si}" style="white-space:nowrap; line-height:1.4; padding:4px 6px;">
      <div style="font-weight:bold;">${label}</div>
      <div style="font-size:7px;color:#cce4ff;">${data.meta.site_a}→${data.meta.site_b}: ${kmStr(abKm)} / ${ftStr(abKm)}</div>
      <div style="font-size:7px;color:#ffe0b2;">${data.meta.site_b}→${data.meta.site_a}: ${kmStr(baKm)} / ${ftStr(baKm)}</div>
    </th>`;
  }
  hdr.innerHTML = h;
  hdr.querySelectorAll('th[data-si]').forEach(th => {
    th.addEventListener('click', () => {
      const sp = data.splices[+th.dataset.si];
      highlightKm = sp.km;
      // If no ribbon selected yet, select the first one
      if (currentRibbon < 0) {
        const firstRib = data.ribbons[0];
        currentRibbon = 0; currentFiber = -1;
        document.querySelector('.ribbon-label')?.classList.add('active');
        document.getElementById('chart-info').textContent = `Ribbon 1 (${firstRib.tube}) — F${firstRib.fibers}`;
      }
      // Zoom to ±5 km around this splice
      const fullKm = getKmRange();
      const window = Math.min(10, fullKm);
      let ns = sp.km - window / 2, ne = sp.km + window / 2;
      if (ns < 0) { ne -= ns; ns = 0; }
      if (ne > fullKm) { ns -= (ne - fullKm); ne = fullKm; }
      zoomKmStart = Math.max(0, ns);
      zoomKmEnd = ne;
      document.getElementById('km-start').value = Math.round(zoomKmStart);
      document.getElementById('km-end').value = Math.round(zoomKmEnd);
      draw2D();
    });
  });
  for (const rib of data.ribbons) {
    const tr = document.createElement('tr');
    const td0 = document.createElement('td');
    td0.className = 'ribbon-label';
    td0.textContent = `${rib.tube} (${rib.fibers})`;
    td0.addEventListener('click', () => {
      document.querySelectorAll('.ribbon-label').forEach(e => e.classList.remove('active'));
      td0.classList.add('active');
      currentRibbon = rib.ribbon - 1; currentFiber = -1;
      // Reset zoom to full span so traces are visible
      zoomKmStart = null; zoomKmEnd = null;
      document.getElementById('km-start').value = 0;
      document.getElementById('km-end').value = Math.round(data.meta.span_km);
      highlightKm = null;
      document.getElementById('chart-info').textContent = `Ribbon ${rib.ribbon} (${rib.tube}) — F${rib.fibers}`;
      draw2D();
    });
    tr.appendChild(td0);
    for (const cell of rib.cells) {
      const td = document.createElement('td');
      if (cell.entries.length) {
        const types = cell.entries.map(e => e.type);
        if (types.includes('break'))            td.className = 'cell-break';
        else if (types.includes('broke'))       td.className = 'cell-broke';
        else if (types.includes('bfill'))       td.className = 'cell-bfill';
        else if (types.includes('flagged'))     td.className = 'cell-flagged';
        else if (types.includes('b_only_high')) td.className = 'cell-b_only_high';
        else if (types.includes('b_only'))      td.className = 'cell-b_only';
        else if (types.includes('a_only_high')) td.className = 'cell-a_only_high';
        else if (types.includes('a_only'))      td.className = 'cell-a_only';
        td.textContent = cell.entries.map(e => {
          if ((e.type === 'break' || e.type === 'broke') && data.breaks?.[String(e.fnum)]) {
            const bkm = data.breaks[String(e.fnum)].km;
            return e.text + '\nA→B ' + bkm.toFixed(2) + ' km';
          }
          return e.text;
        }).join('\n');
      }
      td.addEventListener('click', () => {
        const sp = data.splices[cell.splice_idx];
        if (!sp) return;
        // Select this ribbon if not already selected
        if (currentRibbon !== rib.ribbon - 1) {
          document.querySelectorAll('.ribbon-label').forEach(e => e.classList.remove('active'));
          td0.classList.add('active');
          currentRibbon = rib.ribbon - 1; currentFiber = -1;
          document.getElementById('chart-info').textContent = `Ribbon ${rib.ribbon} (${rib.tube}) — F${rib.fibers}`;
        }
        // Zoom in tight to ±2 km around this splice so events are clearly visible
        highlightKm = sp.km;
        const fullKm = getKmRange();
        const zoomHalf = 2.0;
        let ns = sp.km - zoomHalf, ne = sp.km + zoomHalf;
        if (ns < 0) { ne -= ns; ns = 0; }
        if (ne > fullKm) { ns -= (ne - fullKm); ne = fullKm; }
        zoomKmStart = Math.max(0, ns); zoomKmEnd = ne;
        document.getElementById('km-start').value = ns.toFixed(1);
        document.getElementById('km-end').value = ne.toFixed(1);
        draw2D();
      });
      tr.appendChild(td);
    }
    body.appendChild(tr);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// 2D TRACE (top right) — raw dB like EXFO
// ═══════════════════════════════════════════════════════════════════════════

// Build a composite A+B trace for one fiber.
// traceB is in A-frame km coords (km_a = span - km_b), sorted ascending.
// traceB[0]   = B far-end (leftmost km, lowest dB — most attenuation from B-launch)
// traceB[last]= B launch  (rightmost km, highest dB)
// This slopes UP left→right in raw form. We transform it:
//   db_B_display = (db_A_at_leftmost + db_B_far) - db_b
// so it slopes DOWN left→right at the same rate as A, stitched at the break
// (or at km=0 for healthy fibers). Then average A and B where both exist.
function buildCompositeTrace(fnum, traceA, traceB, brk) {
  function interp(trace, km) {
    if (!trace || trace.length === 0) return null;
    if (km <= trace[0][0]) return trace[0][1];
    if (km >= trace[trace.length-1][0]) return trace[trace.length-1][1];
    for (let i = 0; i < trace.length - 1; i++) {
      if (trace[i][0] <= km && trace[i+1][0] >= km) {
        const t = (km - trace[i][0]) / (trace[i+1][0] - trace[i][0]);
        return trace[i][1] + t * (trace[i+1][1] - trace[i][1]);
      }
    }
    return null;
  }

  // B traces in fiber_traces_b may extend the full span in A-frame because
  // the B-direction SOR doesn't know where the A-direction break is.
  // For broken fibers, B's data before brk.km in A-frame is B's noise
  // (the region B can't see past the break either).
  //
  // Stitch rule:
  //   - bStitchKm = brk.km if broken, else traceB[0][0] (B's actual far-end)
  //   - anchor: db_A_at_stitch + db_B_at_stitch = bOffset
  //   - db_B_display(km) = bOffset - interp(traceB, km)
  //   - B is only included for km >= bStitchKm (A-frame)

  const bLeftKm  = traceB && traceB.length > 0 ? traceB[0][0] : null;
  const bRightKm = traceB && traceB.length > 0 ? traceB[traceB.length-1][0] : null;

  // The km at which we stitch A→B
  const bStitchKm = (brk && traceB) ? brk.km : bLeftKm;

  let bOffset = null;
  if (traceB && traceB.length >= 2 && bStitchKm !== null) {
    // A signal at the stitch km (last real A point before cliff)
    let db_A_stitch = null;
    if (traceA && traceA.length > 0) {
      if (brk) {
        for (let i = traceA.length - 1; i >= 0; i--) {
          if (traceA[i][0] <= brk.km) { db_A_stitch = traceA[i][1]; break; }
        }
      } else {
        db_A_stitch = interp(traceA, bStitchKm);
      }
    }
    // B signal at the stitch km
    const db_B_stitch = interp(traceB, bStitchKm);
    if (db_A_stitch !== null && db_B_stitch !== null) {
      // bOffset such that db_B_display(bStitchKm) = db_A_stitch
      // db_B_display = bOffset - db_b  =>  bOffset = db_A_stitch + db_B_stitch
      bOffset = db_A_stitch + db_B_stitch;
    }
  }

  // Union of km points from both traces, sorted ascending
  const kmSet = new Set();
  if (traceA) traceA.forEach(p => { if (!brk || p[0] <= brk.km) kmSet.add(p[0]); });
  if (traceB && bStitchKm !== null) traceB.forEach(p => { if (p[0] >= bStitchKm - 0.05) kmSet.add(p[0]); });
  const kms = [...kmSet].sort((a,b) => a-b);

  const result = [];
  for (const km of kms) {
    // A: valid only up to and including break km
    let aDb = null;
    if (traceA && (!brk || km <= brk.km)) {
      aDb = interp(traceA, km);
    }
    // B: valid only from stitch km onward
    let bDb = null;
    if (traceB && bOffset !== null && bStitchKm !== null && bRightKm !== null
        && km >= bStitchKm - 0.05 && km <= bRightKm + 0.05) {
      const bRaw = interp(traceB, km);
      if (bRaw !== null) bDb = bOffset - bRaw;
    }
    let avg = null;
    if      (aDb !== null && bDb !== null) avg = (aDb + bDb) / 2;
    else if (aDb !== null)                avg = aDb;
    else if (bDb !== null)                avg = bDb;
    if (avg !== null) result.push({ km, avg, aDb, bDb });
  }
  return result;
}

function draw2D() {
  const panel = document.getElementById('top-panel');
  const canvas = document.getElementById('trace-canvas');
  const dpr = window.devicePixelRatio;
  canvas.width = panel.clientWidth * dpr;
  canvas.height = panel.clientHeight * dpr;
  canvas.style.width = panel.clientWidth + 'px';
  canvas.style.height = panel.clientHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = panel.clientWidth, H = panel.clientHeight;
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);

  const rs = data.meta.ribbon_size;
  let fibers = [];
  if (currentFiber > 0) fibers = [currentFiber];
  else if (currentRibbon >= 0) {
    const rib = data.ribbons[currentRibbon];
    for (let f = rib.f_start; f <= rib.f_end; f++) fibers.push(f);
  } else return;

  // Pre-build composite traces now so dB range can use signal-only values
  compositeData = {};
  if (showBDir && data.fiber_traces_b) {
    for (const f of fibers) {
      const tA = data.fiber_traces?.[String(f)];
      const tB = data.fiber_traces_b?.[String(f)];
      const brk = data.breaks?.[String(f)];
      if (tA || tB) compositeData[f] = buildCompositeTrace(f, tA, tB, brk);
    }
  }

  // Find ranges from signal-only data (skip noise cliff for broken fibers)
  let globalMinDb = Infinity, globalMaxDb = -Infinity, globalMaxKm = 0;
  for (const f of fibers) {
    const brk = data.breaks?.[String(f)];
    if (showBDir && compositeData[f]) {
      for (const pt of compositeData[f]) {
        if (pt.avg < globalMinDb) globalMinDb = pt.avg;
        if (pt.avg > globalMaxDb) globalMaxDb = pt.avg;
        if (pt.km > globalMaxKm) globalMaxKm = pt.km;
      }
    } else {
      const t = data.fiber_traces?.[String(f)];
      if (!t) continue;
      for (const [km, db] of t) {
        if (brk && km > brk.km + 0.1) continue; // skip noise cliff
        if (db < globalMinDb) globalMinDb = db;
        if (db > globalMaxDb) globalMaxDb = db;
        if (km > globalMaxKm) globalMaxKm = km;
      }
    }
  }
  // Always use span_km as the km extent so all splices are visible
  globalMaxKm = data.meta?.span_km || globalMaxKm || 75;
  if (globalMinDb === Infinity) return;

  // Apply zoom range
  const viewKmStart = zoomKmStart ?? 0;
  const viewKmEnd = zoomKmEnd ?? globalMaxKm;

  // Find dB range within zoom window (signal-only)
  let minDb = Infinity, maxDb = -Infinity;
  for (const f of fibers) {
    const brk = data.breaks?.[String(f)];
    if (showBDir && compositeData[f]) {
      for (const pt of compositeData[f]) {
        if (pt.km >= viewKmStart && pt.km <= viewKmEnd) {
          if (pt.avg < minDb) minDb = pt.avg;
          if (pt.avg > maxDb) maxDb = pt.avg;
        }
      }
    } else {
      const t = data.fiber_traces?.[String(f)];
      if (!t) continue;
      for (const [km, db] of t) {
        if (brk && km > brk.km + 0.1) continue; // skip noise cliff
        if (km >= viewKmStart && km <= viewKmEnd) {
          if (db < minDb) minDb = db;
          if (db > maxDb) maxDb = db;
        }
      }
    }
  }
  if (minDb === Infinity) { minDb = globalMinDb; maxDb = globalMaxDb; }
  const dbPad = (maxDb - minDb) * 0.05;
  minDb -= dbPad; maxDb += dbPad;

  const ML = 45, MR = 15, MT = 20, MB = 30;
  const cW = W - ML - MR, cH = H - MT - MB;
  const kmToX = km => ML + ((km - viewKmStart) / (viewKmEnd - viewKmStart)) * cW;
  // Trace values increase with distance (loss accumulates), so map low→top, high→bottom
  // giving a downward-sloping OTDR trace from left to right
  const dbToY = db => MT + ((db - minDb) / (maxDb - minDb)) * cH;

  // Grid
  ctx.strokeStyle = '#f0f0f0'; ctx.lineWidth = 0.5;
  for (let km = 0; km <= viewKmEnd; km += 10) { const x = kmToX(km); if (x >= ML && x <= ML+cW) { ctx.beginPath(); ctx.moveTo(x, MT); ctx.lineTo(x, MT+cH); ctx.stroke(); } }
  for (let db = Math.ceil(minDb); db <= maxDb; db += 2) { const y = dbToY(db); ctx.beginPath(); ctx.moveTo(ML, y); ctx.lineTo(ML+cW, y); ctx.stroke(); }

  // Splice markers
  for (const sp of data.splices) {
    const x = kmToX(sp.km);
    const isHl = highlightKm && Math.abs(sp.km - highlightKm) < 0.1;
    ctx.strokeStyle = sp.is_bend ? (isHl ? 'rgba(230,126,34,0.7)' : 'rgba(230,126,34,0.2)')
                                 : (isHl ? 'rgba(31,78,121,0.6)' : 'rgba(93,173,226,0.2)');
    ctx.lineWidth = isHl ? 2.5 : 1;
    ctx.beginPath(); ctx.moveTo(x, MT); ctx.lineTo(x, MT+cH); ctx.stroke();
    ctx.fillStyle = sp.is_bend ? '#e67e22' : '#1F4E79';
    ctx.font = `${isHl ? 'bold ' : ''}9px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText(sp.is_bend ? 'B' : `S${sp.splice_num}`, x, MT - 4);
  }

  // Grey shades for A-only mode (also used in composite mode)
  const greys = ['#999','#888','#aaa','#777','#bbb','#666','#9a9a9a','#8a8a8a','#7a7a7a','#aaa','#6a6a6a','#b5b5b5'];

  if (showBDir && data.fiber_traces_b) {
    // ── A+B Composite mode ────────────────────────────────────────────────────
    // Single averaged line across the full span. B is converted to slope down
    // L→R (same as A) using: db_B_display = (db_A_at_leftmost + db_B_far) - db_b
    // Then composite = (A + B_display) / 2 where both exist, else whichever is available.
    for (let fi = 0; fi < fibers.length; fi++) {
      const fnum = fibers[fi];
      const traceA = data.fiber_traces?.[String(fnum)];
      const traceB = data.fiber_traces_b?.[String(fnum)];
      const brk = data.breaks?.[String(fnum)];
      if (!traceA && !traceB) continue;
      const lw = fibers.length === 1 ? 1.8 : 0.8;

      const comp = buildCompositeTrace(fnum, traceA, traceB, brk);
      compositeData[fnum] = comp;
      if (comp.length < 2) continue;

      ctx.strokeStyle = greys[fi % greys.length];
      ctx.lineWidth = lw;
      ctx.setLineDash([]);
      ctx.beginPath();
      let started = false;
      for (const pt of comp) {
        if (pt.km < viewKmStart - 0.1 || pt.km > viewKmEnd + 0.1) { started = false; continue; }
        const x = kmToX(pt.km), y = dbToY(pt.avg);
        if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Break marker — small red dot + label at stitch point (no noise cliff)
      if (brk) {
        const bx = kmToX(brk.km);
        const pt = comp.find(p => Math.abs(p.km - brk.km) < 0.5);
        if (pt) {
          const by = dbToY(pt.avg);
          ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI * 2);
          ctx.fillStyle = '#FF4444'; ctx.fill();
          ctx.fillStyle = '#FF4444'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'left';
          ctx.fillText(`F${fnum} ${brk.type}`, bx + 3, by - 5);
        }
      }
    }
  } else {
    // ── A-only mode ───────────────────────────────────────────────────────────
    for (let fi = 0; fi < fibers.length; fi++) {
      const fnum = fibers[fi];
      const trace = data.fiber_traces?.[String(fnum)];
      if (!trace || trace.length < 2) continue;
      const brk = data.breaks?.[String(fnum)];
      const lw = fibers.length === 1 ? 1.8 : 0.8;

      if (brk) {
        // Healthy portion in grey
        ctx.strokeStyle = greys[fi % greys.length]; ctx.lineWidth = lw;
        ctx.beginPath(); let started = false;
        for (const [km, db] of trace) {
          if (km > brk.km) break;
          const x = kmToX(km), y = dbToY(db);
          if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
        }
        ctx.stroke();
        // Break cliff + noise in RED
        ctx.strokeStyle = '#FF4444'; ctx.lineWidth = lw + 0.5;
        ctx.beginPath(); started = false;
        for (const [km, db] of trace) {
          if (km < brk.km - 0.5) continue;
          const x = kmToX(km), y = dbToY(db);
          if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
        }
        ctx.stroke();
        const bx = kmToX(brk.km);
        const breakPt = trace.find(t => t[0] >= brk.km);
        const by = breakPt ? dbToY(breakPt[1]) : MT + 10;
        ctx.fillStyle = '#FF4444'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText(`F${fnum} ${brk.type}`, bx + 3, by - 5);
        ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI * 2); ctx.fillStyle = '#FF4444'; ctx.fill();
      } else {
        // Healthy — all grey
        ctx.strokeStyle = greys[fi % greys.length]; ctx.lineWidth = lw;
        ctx.beginPath();
        for (let i = 0; i < trace.length; i++) {
          const x = kmToX(trace[i][0]), y = dbToY(trace[i][1]);
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }
  }

  // ── Gainer/Loser markers at each splice ──────────────────────────────────
  for (const sp of data.splices) {
    if (sp.is_bend) continue;
    const sx = kmToX(sp.km);
    if (sx < ML || sx > ML + cW) continue;

    for (let fi = 0; fi < fibers.length; fi++) {
      const fnum = fibers[fi];
      const brk = data.breaks?.[String(fnum)];

      // Skip splices that are in noise — past the break (A-only) or
      // past the B coverage in composite mode
      if (brk && !showBDir && sp.km > brk.km) continue;

      let beforeDb = null, afterDb = null;
      let bSum = 0, bCnt = 0, aSum = 0, aCnt = 0;

      if (showBDir && compositeData[fnum]) {
        // Use composite averaged trace for step measurement
        const comp = compositeData[fnum];
        for (const pt of comp) {
          const dist = pt.km - sp.km;
          if (dist >= -0.3 && dist < -0.05) { bSum += pt.avg; bCnt++; }
          if (dist > 0.05 && dist <= 0.3)  { aSum += pt.avg; aCnt++; }
        }
      } else {
        const trace = data.fiber_traces?.[String(fnum)];
        if (!trace || trace.length < 4) continue;
        for (const [km, db] of trace) {
          if (brk && km > brk.km) break; // don't read into noise
          const dist = km - sp.km;
          if (dist >= -0.3 && dist < -0.05) { bSum += db; bCnt++; }
          if (dist > 0.05 && dist <= 0.3)  { aSum += db; aCnt++; }
        }
      }
      if (bCnt >= 2 && aCnt >= 2) { beforeDb = bSum / bCnt; afterDb = aSum / aCnt; }
      if (beforeDb === null || afterDb === null) continue;

      const stepDb = beforeDb - afterDb; // positive = loss, negative = gain
      if (Math.abs(stepDb) < 0.03) continue; // below noise floor

      const y = dbToY((beforeDb + afterDb) / 2);
      const size = Math.min(6, Math.max(2.5, Math.abs(stepDb) * 8));

      if (stepDb > 0) {
        // LOSER — red/pink triangle pointing down
        ctx.fillStyle = stepDb > 0.15 ? '#FF4444' : '#FFC7CE';
        ctx.beginPath();
        ctx.moveTo(sx - size, y - size);
        ctx.lineTo(sx + size, y - size);
        ctx.lineTo(sx, y + size);
        ctx.closePath();
        ctx.fill();
      } else {
        // GAINER — green triangle pointing up
        ctx.fillStyle = stepDb < -0.15 ? '#27ae60' : '#a9dfbf';
        ctx.beginPath();
        ctx.moveTo(sx - size, y + size);
        ctx.lineTo(sx + size, y + size);
        ctx.lineTo(sx, y - size);
        ctx.closePath();
        ctx.fill();
      }
    }
  }

  // ── Damage dots from tech report ─────────────────────────────────────────
  // For each fiber+splice that has an entry in the damage table, draw a dot
  // on the trace at that position. Color matches the damage table cell.
  damageDots = [];
  if (currentRibbon >= 0) {
    const rib = data.ribbons[currentRibbon];
    for (const cell of rib.cells) {
      const sp = data.splices[cell.splice_idx];
      if (!sp) continue;
      const sx = kmToX(sp.km);
      if (sx < ML - 5 || sx > ML + cW + 5) continue;

      for (const entry of cell.entries) {
        const fnum = entry.fnum;
        const brk = data.breaks?.[String(fnum)];

        // Find dB at this splice position from the appropriate source
        let nearestDb = null, nearestDist = Infinity;

        if (showBDir && compositeData[fnum]) {
          // Use composite trace — always has signal at splice positions
          for (const pt of compositeData[fnum]) {
            const d = Math.abs(pt.km - sp.km);
            if (d < nearestDist) { nearestDist = d; nearestDb = pt.avg; }
          }
        } else {
          const trace = data.fiber_traces?.[String(fnum)];
          if (!trace) continue;
          for (const [km, db] of trace) {
            if (brk && km > brk.km + 0.1) break; // don't read into noise cliff
            const d = Math.abs(km - sp.km);
            if (d < nearestDist) { nearestDist = d; nearestDb = db; }
          }
        }
        // Skip if not covered or too far
        if (nearestDb === null || nearestDist > 0.5) continue;

        const y = dbToY(nearestDb);
        const dotR = 5;

        // Color and category by entry type (matching damage table)
        let color, category;
        switch (entry.type) {
          case 'break':
            color = '#FF4444'; category = 'BREAK'; break;
          case 'broke':
            color = '#FF8800'; category = 'BROKE (blind past break)'; break;
          case 'flagged':
            color = '#D63384'; category = 'FLAGGED — high splice loss'; break;
          case 'bfill':
            color = '#0070C0'; category = 'B-FILL — A blind, using B direction'; break;
          case 'normal':
            color = '#e67e22'; category = 'Splice loss'; break;
          default:
            color = '#e67e22'; category = entry.type || 'Event'; break;
        }

        // Draw filled dot with border
        ctx.beginPath();
        ctx.arc(sx, y, dotR, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Store for hover — include category and splice info
        damageDots.push({
          x: sx, y, r: dotR + 3,
          text: entry.text,
          color, fnum, category,
          splice_km: sp.km,
          splice_label: sp.is_bend ? `Bend at ${sp.km}km` : `Splice ${sp.splice_num} at ${sp.km}km`,
        });
      }
    }
  }

  // ── Store highlight params so hover can redraw without re-calling draw2D ──
  const _lw = fibers.length === 1 ? 1.8 : 0.8;
  const _kmToX = kmToX;
  const _dbToY = dbToY;
  const _xToKm = (x) => viewKmStart + (x - ML) / cW * (viewKmEnd - viewKmStart);
  window._highlightParams = { lw: _lw, kmToX: _kmToX, dbToY: _dbToY, xToKm: _xToKm, fibers: [...fibers] };

  // Fiber legend
  ctx.font = '8px Consolas, monospace'; ctx.textAlign = 'right';
  for (let fi = 0; fi < fibers.length; fi++) {
    const fnum = fibers[fi];
    ctx.fillStyle = data.breaks[String(fnum)] ? '#FF4444' : greys[fi % greys.length];
    ctx.fillText(`F${fnum}`, ML - 3, MT + 10 + fi * 9);
  }

  // Axes
  ctx.fillStyle = '#888'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
  const kmStep = (viewKmEnd - viewKmStart) > 30 ? 10 : (viewKmEnd - viewKmStart) > 10 ? 5 : 1;
  for (let km = Math.ceil(viewKmStart / kmStep) * kmStep; km <= viewKmEnd; km += kmStep) {
    const x = kmToX(km);
    if (x >= ML && x <= ML + cW) ctx.fillText(`${km}`, x, MT + cH + 12);
  }
  ctx.fillText('km', ML + cW + 8, MT + cH + 12);
  ctx.textAlign = 'right';
  for (let db = Math.ceil(minDb); db <= maxDb; db += 2) {
    const y = dbToY(db); if (y > MT + 5 && y < MT + cH - 5) ctx.fillText(`${db}`, ML - 3, y + 3);
  }
  ctx.save(); ctx.translate(10, MT + cH/2); ctx.rotate(-Math.PI/2);
  ctx.textAlign = 'center'; ctx.font = '9px sans-serif'; ctx.fillStyle = '#888';
  ctx.fillText('dB', 0, 0); ctx.restore();

  // Title
  const rib = currentRibbon >= 0 ? data.ribbons[currentRibbon] : null;
  ctx.fillStyle = '#1F4E79'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'left';
  const t = currentFiber > 0 ? `Fiber ${currentFiber}` : rib ? `${rib.tube} — F${rib.fibers}` : '';
  ctx.fillText(t, ML + 3, MT - 6);

  // Push state to popup so it redraws with the same selection
  syncPopup();
}

// ═══════════════════════════════════════════════════════════════════════════
// 3D TOPO (bottom right)
// ═══════════════════════════════════════════════════════════════════════════
function excessColor(v) {
  if (v < 0.001) return new THREE.Color(0x1a6b3c);
  if (v < 0.005) return new THREE.Color(0x2ecc71);
  if (v < 0.01)  return new THREE.Color(0x7dcea0);
  if (v < 0.02)  return new THREE.Color(0xf1c40f);
  if (v < 0.03)  return new THREE.Color(0xf39c12);
  if (v < 0.05)  return new THREE.Color(0xe67e22);
  if (v < 0.08)  return new THREE.Color(0xe74c3c);
  return new THREE.Color(0x8b0000);
}
function makeLabel(text, color='#333', size=0.12) {
  const c = document.createElement('canvas'); c.width = 512; c.height = 64;
  const x = c.getContext('2d'); x.font = 'bold 32px sans-serif'; x.fillStyle = color;
  x.textAlign = 'center'; x.fillText(text, 256, 42);
  const t = new THREE.CanvasTexture(c);
  const m = new THREE.SpriteMaterial({ map: t, transparent: true, depthTest: false });
  const s = new THREE.Sprite(m); s.scale.set(size*2.5, size*0.3, 1); return s;
}

function initTopo() {
  const el = document.getElementById('topo-3d');
  scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
  camera = new THREE.PerspectiveCamera(50, el.clientWidth / el.clientHeight, 0.01, 100);
  camera.position.set(2, 2, 2);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(el.clientWidth, el.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  el.appendChild(renderer.domElement);
  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(2, 0, 0.2); controls.enableDamping = true;
  scene.add(new THREE.AmbientLight(0x808080, 1.5));
  const dl = new THREE.DirectionalLight(0xffffff, 0.7); dl.position.set(5, 8, 5); scene.add(dl);
  window.addEventListener('resize', () => { draw2D(); });
}

function buildTopo() {
  if (topoGroup) { topoGroup.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) { if (o.material.map) o.material.map.dispose(); o.material.dispose(); } }); scene.remove(topoGroup); }
  topoGroup = new THREE.Group();
  const baseline = data.meta.baseline, rs = data.meta.ribbon_size;
  let fibers = [];
  if (currentFiber > 0) fibers = [currentFiber];
  else if (currentRibbon >= 0) { const rib = data.ribbons[currentRibbon]; for (let f = rib.f_start; f <= rib.f_end; f++) fibers.push(f); }
  else { for (const rib of data.ribbons) { for (let f = rib.f_start; f <= rib.f_end; f++) { if (data.fiber_profiles[String(f)]) { fibers.push(f); break; } } } }

  const valid = fibers.filter(f => { const p = data.fiber_profiles[String(f)]; return p && p.length >= 2; });
  if (!valid.length) { scene.add(topoGroup); return; }

  let longest = null;
  for (const f of valid) { const p = data.fiber_profiles[String(f)]; if (!longest || p.length > longest.length) longest = p; }
  const kmGrid = longest.map(p => p[0]);
  const nCols = kmGrid.length, nRows = valid.length;
  const xS = 0.05, zS = nRows === 1 ? 0.3 : 0.025;

  const geom = new THREE.PlaneGeometry(nCols*xS, nRows*zS, nCols-1, Math.max(nRows-1,1));
  geom.rotateX(-Math.PI/2); geom.translate(nCols*xS/2, 0, nRows*zS/2);
  const pos = geom.attributes.position;
  const vc = new Float32Array(pos.count * 3);
  for (let r = 0; r < nRows; r++) {
    const prof = data.fiber_profiles[String(valid[r])];
    for (let c = 0; c < nCols; c++) {
      const idx = r * nCols + c;
      let ex = prof && c < prof.length ? prof[c][1] - baseline : 0;
      pos.setY(idx, Math.max(0, ex) * vScale);
      const col = excessColor(Math.max(0, ex));
      vc[idx*3] = col.r; vc[idx*3+1] = col.g; vc[idx*3+2] = col.b;
    }
  }
  geom.setAttribute('color', new THREE.BufferAttribute(vc, 3));
  geom.computeVertexNormals();
  topoGroup.add(new THREE.Mesh(geom, new THREE.MeshPhongMaterial({ vertexColors: true, side: THREE.DoubleSide, shininess: 20 })));

  // Break spikes
  for (let r = 0; r < nRows; r++) {
    const f = valid[r]; if (!data.breaks[String(f)]) continue;
    const brk = data.breaks[String(f)];
    const bx = (brk.km / kmGrid[nCols-1]) * nCols * xS;
    const bz = (r + 0.5) * zS;
    const h = 2;
    topoGroup.add(new THREE.Mesh(new THREE.ConeGeometry(0.02, h, 6), new THREE.MeshPhongMaterial({ color: 0xe74c3c, emissive: 0x990000 })).translateX(bx).translateY(h/2).translateZ(bz));
    const lb = makeLabel(`F${f} ${brk.type}`, '#e74c3c', 0.05);
    lb.position.set(bx, h + 0.08, bz); topoGroup.add(lb);
  }

  // Splices
  const tw = nRows * zS;
  for (const sp of data.splices) {
    const x = (sp.km / kmGrid[nCols-1]) * nCols * xS;
    const c = sp.is_bend ? 0xe67e22 : 0x5dade2;
    const pl = new THREE.Mesh(new THREE.PlaneGeometry(0.004, tw + 0.02), new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 0.1, side: THREE.DoubleSide }));
    pl.position.set(x, 0.2, tw/2); pl.rotation.y = Math.PI/2; topoGroup.add(pl);
    const lb = makeLabel(sp.is_bend ? `B ${sp.km}` : `S${sp.splice_num}`, sp.is_bend ? '#e67e22' : '#1F4E79', 0.06);
    lb.position.set(x, 0.5, -0.03); topoGroup.add(lb);
  }
  for (let km = 0; km <= data.meta.span_km; km += 10) {
    const x = (km / kmGrid[nCols-1]) * nCols * xS;
    const lb = makeLabel(`${km}km`, '#bbb', 0.04);
    lb.position.set(x, -0.04, -0.03); topoGroup.add(lb);
  }
  scene.add(topoGroup);
  const mx = nCols*xS/2;
  camera.position.set(mx, nRows > 5 ? 2 : 1, tw + (nRows > 5 ? 2 : 1.5));
  controls.target.set(mx, 0, tw * 0.4);
}

// Called from setup screen after data is loaded
window.loadDataAndStart = async function() {
  try {
    // Try pywebview API first, fall back to static file
    if (window.pywebview?.api?.get_data) {
      data = await window.pywebview.api.get_data();
    }
    if (!data) {
      data = await (await fetch('combined_data.json?v=' + Date.now())).json();
    }
  } catch (e) {
    try { data = await (await fetch('combined_data.json?v=' + Date.now())).json(); }
    catch (e2) { alert('Could not load data: ' + e2.message); return; }
  }
  document.getElementById('loading').style.display = 'none';
  window._popupData = data;   // expose for popup window
  buildTable();

  document.getElementById('fiber-btn').addEventListener('click', () => {
    const f = parseInt(document.getElementById('fiber-input').value);
    if (f && data.fiber_traces?.[String(f)]) {
      currentFiber = f; currentRibbon = Math.floor((f-1)/data.meta.ribbon_size);
      document.getElementById('chart-info').textContent = `Fiber ${f}`;
      draw2D();
    }
  });
  document.getElementById('fiber-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('fiber-btn').click(); });
  document.getElementById('ribbon-btn').addEventListener('click', () => {
    currentFiber = -1;
    if (currentRibbon >= 0) { const r = data.ribbons[currentRibbon]; document.getElementById('chart-info').textContent = `${r.tube} — F${r.fibers}`; draw2D(); }
  });

  // A+B toggle
  document.getElementById('ab-toggle').addEventListener('click', () => {
    showBDir = !showBDir;
    const btn = document.getElementById('ab-toggle');
    if (showBDir) {
      btn.textContent = 'Show A only';
      btn.style.background = '#c87533';
      btn.style.color = '#fff';
      btn.style.borderColor = '#c87533';
    } else {
      btn.textContent = 'Show A+B';
      btn.style.background = '';
      btn.style.color = '#c87533';
      btn.style.borderColor = '#c87533';
    }
    draw2D();
  });

  // Zoom controls
  document.getElementById('km-end').value = Math.round(data.meta.span_km);
  document.getElementById('zoom-btn').addEventListener('click', () => {
    zoomKmStart = parseFloat(document.getElementById('km-start').value);
    zoomKmEnd = parseFloat(document.getElementById('km-end').value);
    draw2D();
  });
  document.getElementById('reset-zoom').addEventListener('click', () => {
    zoomKmStart = null; zoomKmEnd = null;
    document.getElementById('km-start').value = 0;
    document.getElementById('km-end').value = Math.round(data.meta.span_km);
    draw2D();
  });


  // Column click also zooms 2D to ±5 km around the splice
  document.querySelectorAll('#hdr-row th[data-si]').forEach(th => {
    th.addEventListener('dblclick', () => {
      const sp = data.splices[+th.dataset.si];
      zoomKmStart = Math.max(0, sp.km - 5);
      zoomKmEnd = Math.min(data.meta.span_km, sp.km + 5);
      document.getElementById('km-start').value = Math.round(zoomKmStart);
      document.getElementById('km-end').value = Math.round(zoomKmEnd);
      highlightKm = sp.km;
      draw2D();
    });
  });

  // ── Scroll-to-zoom + drag-to-pan on 2D canvas ─────────────────────────
  const traceCanvas = document.getElementById('trace-canvas');

  // Scroll to zoom (centered on mouse position)
  traceCanvas.addEventListener('wheel', ev => {
    ev.preventDefault();
    const fullKm = getKmRange();
    const s = zoomKmStart ?? 0;
    const e = zoomKmEnd ?? fullKm;
    const range = e - s;
    if (range < 0.5 && ev.deltaY < 0) return; // don't zoom in past 0.5 km

    // Mouse position as fraction of canvas width
    const rect = traceCanvas.getBoundingClientRect();
    const frac = Math.max(0, Math.min(1, (ev.clientX - rect.left - 45) / (rect.width - 60)));

    // Zoom factor
    const factor = ev.deltaY > 0 ? 1.15 : 0.85;
    const newRange = Math.min(fullKm, range * factor);
    const center = s + range * frac;
    let ns = center - newRange * frac;
    let ne = center + newRange * (1 - frac);

    // Clamp
    if (ns < 0) { ne -= ns; ns = 0; }
    if (ne > fullKm) { ns -= (ne - fullKm); ne = fullKm; }
    ns = Math.max(0, ns);

    zoomKmStart = ns;
    zoomKmEnd = ne;
    document.getElementById('km-start').value = Math.round(ns);
    document.getElementById('km-end').value = Math.round(ne);
    draw2D();
  }, { passive: false });

  // Drag to pan
  // Hover tooltip for damage dots + fiber highlighting
  const traceTooltip = document.getElementById('trace-tooltip');
  let hoveredFnum = null;

  traceCanvas.addEventListener('mousemove', ev => {
    if (isDragging) { traceTooltip.style.display = 'none'; return; }
    const rect = traceCanvas.getBoundingClientRect();
    const mx = ev.clientX - rect.left;
    const my = ev.clientY - rect.top;

    // Check damage dots
    let hitDot = null;
    for (const dot of damageDots) {
      const dx = mx - dot.x, dy = my - dot.y;
      if (dx * dx + dy * dy <= dot.r * dot.r) {
        hitDot = dot;
        break;
      }
    }

    if (hitDot) {
      traceTooltip.innerHTML =
        `<b style="color:${hitDot.color}">Fiber ${hitDot.fnum}</b><br>` +
        `<b>${hitDot.category}</b><br>` +
        `${hitDot.splice_label}<br>` +
        `<span style="font-size:10px;color:#888">${hitDot.text}</span>`;
      traceTooltip.style.display = 'block';
      traceTooltip.style.left = (mx + 15) + 'px';
      traceTooltip.style.top = (my + 15) + 'px';
      traceCanvas.style.cursor = 'pointer';

      // Highlight this fiber's trace — redraw with it on top in the dot's color
      if (hoveredFnum !== hitDot.fnum) {
        hoveredFnum = hitDot.fnum;
        draw2D();  // redraw base chart
        // Now draw the highlighted fiber on top
        drawFiberHighlight(hitDot.fnum, hitDot.color);
      }
      return;
    }

    // Composite A+B hover — show A / B / avg at mouse km
    if (showBDir && window._highlightParams?.xToKm && Object.keys(compositeData).length > 0) {
      const kmAtMouse = window._highlightParams.xToKm(mx);
      const fiberList = window._highlightParams.fibers || [];
      let rows = `<div style="color:#888;font-size:9px;margin-bottom:2px">${kmAtMouse.toFixed(2)} km</div>`;
      let anyHit = false;
      for (const fnum of fiberList) {
        const comp = compositeData[fnum];
        if (!comp || comp.length === 0) continue;
        let near = null, nearDist = Infinity;
        for (const pt of comp) {
          const d = Math.abs(pt.km - kmAtMouse);
          if (d < nearDist) { nearDist = d; near = pt; }
        }
        if (!near || nearDist > 1.5) continue;
        anyHit = true;
        const aStr = near.aDb != null ? `A→B: ${near.aDb.toFixed(2)}` : 'A→B: —';
        const bStr = near.bDb != null ? `B→A: ${near.bDb.toFixed(2)}` : 'B→A: —';
        rows += `<div style="margin:1px 0"><b style="color:#1F4E79">F${fnum}</b> &nbsp;`
              + `<span style="color:#555">${aStr}</span> &nbsp; `
              + `<span style="color:#c87533">${bStr}</span> &nbsp; `
              + `<b>Avg: ${near.avg.toFixed(2)} dB</b></div>`;
      }
      if (anyHit) {
        traceTooltip.innerHTML = rows;
        traceTooltip.style.display = 'block';
        traceTooltip.style.left = (mx + 15) + 'px';
        traceTooltip.style.top  = (my + 15) + 'px';
        traceCanvas.style.cursor = 'crosshair';
        if (hoveredFnum !== null) { hoveredFnum = null; }
        return;
      }
    }

    // No dot hit — clear highlight if needed
    if (hoveredFnum !== null) {
      hoveredFnum = null;
      draw2D();  // redraw without highlight
    }
    traceTooltip.style.display = 'none';
    traceCanvas.style.cursor = isDragging ? 'grabbing' : 'default';
  });

  traceCanvas.addEventListener('mousedown', ev => {
    isDragging = true;
    dragStartX = ev.clientX;
    dragStartKmS = zoomKmStart ?? 0;
    dragStartKmE = zoomKmEnd ?? getKmRange();
    traceCanvas.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', ev => {
    if (!isDragging) return;
    const rect = traceCanvas.getBoundingClientRect();
    const dx = ev.clientX - dragStartX;
    const kmPerPx = (dragStartKmE - dragStartKmS) / (rect.width - 60);
    const dkm = -dx * kmPerPx;
    const fullKm = getKmRange();
    let ns = dragStartKmS + dkm;
    let ne = dragStartKmE + dkm;
    if (ns < 0) { ne -= ns; ns = 0; }
    if (ne > fullKm) { ns -= (ne - fullKm); ne = fullKm; }
    zoomKmStart = Math.max(0, ns);
    zoomKmEnd = ne;
    document.getElementById('km-start').value = Math.round(zoomKmStart);
    document.getElementById('km-end').value = Math.round(zoomKmEnd);
    draw2D();
  });
  window.addEventListener('mouseup', () => {
    if (isDragging) { isDragging = false; traceCanvas.style.cursor = 'default'; }
  });
}

<body>
<div id="pheader">OTDR 2D Trace — Splice Viewer &nbsp;<span id="pheader-label"></span></div>
<div id="ptop">

             style="width:45px;padding:2px;border:1px solid #ccc;border-radius:2px;font-size:9px">
      <span style="color:#888;font-size:9px">to</span>
      <input type="number" id="pkm-end" value="75" min="0" step="1"
             style="width:45px;padding:2px;border:1px solid #ccc;border-radius:2px;font-size:9px">

  </div>
</div>
<script>
var data = null;
try { data = window.opener && window.opener._popupData; } catch(e) {}
if (!data) { document.getElementById('pchart-info').textContent = 'No data — reopen from main window'; }

var currentRibbon = -1, currentFiber = -1, highlightKm = null;
var zoomKmStart = null, zoomKmEnd = null, showBDir = false;
var isDragging = false, dragStartX = 0, dragStartKmS = 0, dragStartKmE = 0;
var damageDots = [];

function getKmRange() {
  if (!data) return 75;
  var fibers = [];
  if (currentFiber > 0) { fibers = [currentFiber]; }
  else if (currentRibbon >= 0) {
    var rib = data.ribbons[currentRibbon];
    for (var i = rib.f_start; i <= rib.f_end; i++) fibers.push(i);
  }
  var maxKm = 0;
  for (var i = 0; i < fibers.length; i++) {
    var t = data.fiber_traces && data.fiber_traces[String(fibers[i])];
    if (t && t.length) { var last = t[t.length-1][0]; if (last > maxKm) maxKm = last; }
  }
  return maxKm || (data.meta && data.meta.span_km) || 75;
}

function draw2D() {
  if (!data) return;
  var panel = document.getElementById('ptop');
  var canvas = document.getElementById('pcanvas');
  var dpr = window.devicePixelRatio || 1;
  canvas.width = panel.clientWidth * dpr;
  canvas.height = panel.clientHeight * dpr;
  canvas.style.width = panel.clientWidth + 'px';
  canvas.style.height = panel.clientHeight + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  var W = panel.clientWidth, H = panel.clientHeight;
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);

  var fibers = [];
  if (currentFiber > 0) { fibers = [currentFiber]; }
  else if (currentRibbon >= 0) {
    var rib = data.ribbons[currentRibbon];
    for (var f = rib.f_start; f <= rib.f_end; f++) fibers.push(f);
  } else return;

  // Build composite for popup before range calc so we use signal-only dB
  var pCompositeData = {};
  if (showBDir && data.fiber_traces_b) {
    for (var pfi0 = 0; pfi0 < fibers.length; pfi0++) {
      var pf0 = fibers[pfi0];
      var ptA0 = data.fiber_traces && data.fiber_traces[String(pf0)];
      var ptB0 = data.fiber_traces_b && data.fiber_traces_b[String(pf0)];
      var pbrk0 = data.breaks && data.breaks[String(pf0)];
      if (ptA0 || ptB0) pCompositeData[pf0] = pbuildComposite(ptA0, ptB0, pbrk0);
    }
  }

  var gMinDb = Infinity, gMaxDb = -Infinity, gMaxKm = 0;
  for (var fi = 0; fi < fibers.length; fi++) {
    var pbrk1 = data.breaks && data.breaks[String(fibers[fi])];
    if (showBDir && pCompositeData[fibers[fi]]) {
      var pc1 = pCompositeData[fibers[fi]];
      for (var pci1 = 0; pci1 < pc1.length; pci1++) {
        if (pc1[pci1].avg < gMinDb) gMinDb = pc1[pci1].avg;
        if (pc1[pci1].avg > gMaxDb) gMaxDb = pc1[pci1].avg;
        if (pc1[pci1].km > gMaxKm) gMaxKm = pc1[pci1].km;
      }
    } else {
      var tr = data.fiber_traces && data.fiber_traces[String(fibers[fi])];
      if (!tr) continue;
      for (var pi = 0; pi < tr.length; pi++) {
        if (pbrk1 && tr[pi][0] > pbrk1.km + 0.1) break;
        if (tr[pi][1] < gMinDb) gMinDb = tr[pi][1];
        if (tr[pi][1] > gMaxDb) gMaxDb = tr[pi][1];
        if (tr[pi][0] > gMaxKm) gMaxKm = tr[pi][0];
      }
    }
  }
  gMaxKm = (data.meta && data.meta.span_km) || gMaxKm || 75;
  if (gMinDb === Infinity) return;

  var vKmS = zoomKmStart != null ? zoomKmStart : 0;
  var vKmE = zoomKmEnd   != null ? zoomKmEnd   : gMaxKm;
  var minDb = Infinity, maxDb = -Infinity;
  for (var fi = 0; fi < fibers.length; fi++) {
    var pbrk2b = data.breaks && data.breaks[String(fibers[fi])];
    if (showBDir && pCompositeData[fibers[fi]]) {
      var pc2 = pCompositeData[fibers[fi]];
      for (var pci2b = 0; pci2b < pc2.length; pci2b++) {
        if (pc2[pci2b].km >= vKmS && pc2[pci2b].km <= vKmE) {
          if (pc2[pci2b].avg < minDb) minDb = pc2[pci2b].avg;
          if (pc2[pci2b].avg > maxDb) maxDb = pc2[pci2b].avg;
        }
      }
    } else {
      var tr = data.fiber_traces && data.fiber_traces[String(fibers[fi])];
      if (!tr) continue;
      for (var pi = 0; pi < tr.length; pi++) {
        if (pbrk2b && tr[pi][0] > pbrk2b.km + 0.1) break;
        if (tr[pi][0] >= vKmS && tr[pi][0] <= vKmE) {
          if (tr[pi][1] < minDb) minDb = tr[pi][1];
          if (tr[pi][1] > maxDb) maxDb = tr[pi][1];
        }
      }
    }
  }
  if (minDb === Infinity) { minDb = gMinDb; maxDb = gMaxDb; }
  var dbPad = (maxDb - minDb) * 0.05; minDb -= dbPad; maxDb += dbPad;

  var ML = 45, MR = 15, MT = 20, MB = 30;
  var cW = W - ML - MR, cH = H - MT - MB;
  function kmToX(km) { return ML + ((km - vKmS) / (vKmE - vKmS)) * cW; }
  function dbToY(db)  { return MT + ((db - minDb) / (maxDb - minDb)) * cH; }

  // Grid
  ctx.strokeStyle = '#f0f0f0'; ctx.lineWidth = 0.5;
  for (var km = 0; km <= vKmE; km += 10) { var x = kmToX(km); if (x >= ML && x <= ML+cW) { ctx.beginPath(); ctx.moveTo(x,MT); ctx.lineTo(x,MT+cH); ctx.stroke(); } }
  for (var db = Math.ceil(minDb); db <= maxDb; db += 2) { var y = dbToY(db); ctx.beginPath(); ctx.moveTo(ML,y); ctx.lineTo(ML+cW,y); ctx.stroke(); }

  // Splice markers
  for (var si = 0; si < data.splices.length; si++) {
    var sp = data.splices[si], x = kmToX(sp.km);
    var isHl = highlightKm != null && Math.abs(sp.km - highlightKm) < 0.1;
    ctx.strokeStyle = sp.is_bend ? (isHl ? 'rgba(230,126,34,0.7)' : 'rgba(230,126,34,0.2)')
                                 : (isHl ? 'rgba(31,78,121,0.6)'  : 'rgba(93,173,226,0.2)');
    ctx.lineWidth = isHl ? 2.5 : 1;
    ctx.beginPath(); ctx.moveTo(x, MT); ctx.lineTo(x, MT+cH); ctx.stroke();
    ctx.fillStyle = sp.is_bend ? '#e67e22' : '#1F4E79';
    ctx.font = (isHl ? 'bold ' : '') + '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(sp.is_bend ? 'B' : 'S' + sp.splice_num, x, MT - 4);
  }

  // Traces

  // Inline composite builder for popup (same logic as main window buildCompositeTrace)
  function pbuildComposite(ptraceA, ptraceB, pbrk) {
    function pInterp(tr, km) {
      if (!tr || tr.length === 0) return null;
      if (km <= tr[0][0]) return tr[0][1];
      if (km >= tr[tr.length-1][0]) return tr[tr.length-1][1];
      for (var i = 0; i < tr.length-1; i++) {
        if (tr[i][0] <= km && tr[i+1][0] >= km) {
          var t = (km - tr[i][0]) / (tr[i+1][0] - tr[i][0]);
          return tr[i][1] + t*(tr[i+1][1]-tr[i][1]);

      }
      return null;
    }
    var bLeftKm  = ptraceB && ptraceB.length > 0 ? ptraceB[0][0] : null;
    var bRightKm = ptraceB && ptraceB.length > 0 ? ptraceB[ptraceB.length-1][0] : null;
    var bStitchKm = (pbrk && ptraceB) ? pbrk.km : bLeftKm;
    var pbOffset = null;
    if (ptraceB && ptraceB.length >= 2 && bStitchKm !== null) {
      var db_A_stitch = null;
      if (ptraceA && ptraceA.length > 0) {
        if (pbrk) {
          for (var i = ptraceA.length-1; i >= 0; i--) {

          }
        } else {
          db_A_stitch = pInterp(ptraceA, bStitchKm);
        }
      }
      var db_B_stitch = pInterp(ptraceB, bStitchKm);
      if (db_A_stitch !== null && db_B_stitch !== null) pbOffset = db_A_stitch + db_B_stitch;
    }
    var kmSet = {};
    if (ptraceA) ptraceA.forEach(function(p) { if (!pbrk || p[0] <= pbrk.km) kmSet[p[0]] = 1; });
    if (ptraceB && bStitchKm !== null) ptraceB.forEach(function(p) { if (p[0] >= bStitchKm - 0.05) kmSet[p[0]] = 1; });
    var kms = Object.keys(kmSet).map(Number).sort(function(a,b){return a-b;});
    var res = [];
    for (var ki = 0; ki < kms.length; ki++) {
      var km = kms[ki];
      var aDb = null;
      if (ptraceA && (!pbrk || km <= pbrk.km)) aDb = pInterp(ptraceA, km);
      var bDb = null;
      if (ptraceB && pbOffset !== null && bStitchKm !== null && bRightKm !== null
          && km >= bStitchKm - 0.05 && km <= bRightKm + 0.05) {
        var bRaw = pInterp(ptraceB, km);
        if (bRaw !== null) bDb = pbOffset - bRaw;
      }
      var avg = null;
      if (aDb !== null && bDb !== null) avg = (aDb + bDb) / 2;
      else if (aDb !== null) avg = aDb;
      else if (bDb !== null) avg = bDb;

  }

  if (showBDir && data.fiber_traces_b) {
    // ── A+B Composite mode ───────────────────────────────────────────────────
    for (var fi = 0; fi < fibers.length; fi++) {
      var fnum = fibers[fi];
      var brk = data.breaks && data.breaks[String(fnum)];

        var pt = comp[ci];

      if (brk) {
        var bx = kmToX(brk.km);
        var bpt = null;

        if (bpt) {
          var by = dbToY(bpt.avg);
          ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI*2); ctx.fillStyle = '#FF4444'; ctx.fill();
          ctx.fillStyle = '#FF4444'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'left';

    for (var fi = 0; fi < fibers.length; fi++) {
      var fnum = fibers[fi];

      if (!trace || trace.length < 2) continue;
      var brk = data.breaks && data.breaks[String(fnum)];
      var lw = fibers.length === 1 ? 1.8 : 0.8;
      if (brk) {
        ctx.strokeStyle = greys[fi % greys.length]; ctx.lineWidth = lw;
        ctx.beginPath(); var started = false;
        for (var pi = 0; pi < trace.length; pi++) {
          if (trace[pi][0] > brk.km) break;

        ctx.fillStyle = '#FF4444'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'left';

      }

  }

  // Damage dots
  damageDots = [];
  if (currentRibbon >= 0 && data.ribbons[currentRibbon]) {
    var rib = data.ribbons[currentRibbon];
    for (var ci = 0; ci < rib.cells.length; ci++) {

      for (var ei = 0; ei < cell.entries.length; ei++) {

  ctx.fillStyle = '#888'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
  var kmStep = (vKmE - vKmS) > 30 ? 10 : (vKmE - vKmS) > 10 ? 5 : 1;
  for (var km = Math.ceil(vKmS / kmStep) * kmStep; km <= vKmE; km += kmStep) {
    var x = kmToX(km); if (x >= ML && x <= ML + cW) ctx.fillText('' + km, x, MT + cH + 12);

  var ribNow = currentRibbon >= 0 ? data.ribbons[currentRibbon] : null;
  ctx.fillStyle = '#1F4E79'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(currentFiber > 0 ? 'Fiber ' + currentFiber : ribNow ? ribNow.tube + ' — F' + ribNow.fibers : '', ML + 3, MT - 6);
}

// ── Controls ──────────────────────────────────────────────────────────────
window.addEventListener('load', function() {
  if (data) document.getElementById('pkm-end').value = Math.round((data.meta && data.meta.span_km) || 75);

  document.getElementById('pzoom-btn').addEventListener('click', function() {

  document.getElementById('preset-zoom').addEventListener('click', function() {

    draw2D();

  var pcanvas = document.getElementById('pcanvas');
  pcanvas.addEventListener('wheel', function(ev) {
    ev.preventDefault();
    var fullKm = getKmRange();
    var s = zoomKmStart != null ? zoomKmStart : 0;
    var e = zoomKmEnd   != null ? zoomKmEnd   : fullKm;
    var range = e - s;
    if (range < 0.5 && ev.deltaY < 0) return;
    var rect = pcanvas.getBoundingClientRect();
    var frac = Math.max(0, Math.min(1, (ev.clientX - rect.left - 45) / (rect.width - 60)));
    var factor = ev.deltaY > 0 ? 1.15 : 0.85;
    var newRange = Math.min(fullKm, range * factor);
    var center = s + range * frac;
    var ns = center - newRange * frac, ne = center + newRange * (1 - frac);
    if (ns < 0) { ne -= ns; ns = 0; } if (ne > fullKm) { ns -= (ne - fullKm); ne = fullKm; }
    zoomKmStart = Math.max(0, ns); zoomKmEnd = ne;
    document.getElementById('pkm-start').value = Math.round(zoomKmStart);
    document.getElementById('pkm-end').value   = Math.round(zoomKmEnd);
    draw2D();

  pcanvas.addEventListener('mousedown', function(ev) {
    isDragging = true; dragStartX = ev.clientX;
    dragStartKmS = zoomKmStart != null ? zoomKmStart : 0;

  });
  window.addEventListener('mousemove', function(ev) {
    if (!isDragging) return;
    var rect = pcanvas.getBoundingClientRect();
    var dx = ev.clientX - dragStartX;
    var kmPerPx = (dragStartKmE - dragStartKmS) / (rect.width - 60);
    var dkm = -dx * kmPerPx, fullKm = getKmRange();
    var ns = dragStartKmS + dkm, ne = dragStartKmE + dkm;
    if (ns < 0) { ne -= ns; ns = 0; } if (ne > fullKm) { ns -= (ne - fullKm); ne = fullKm; }
    zoomKmStart = Math.max(0, ns); zoomKmEnd = ne;
    document.getElementById('pkm-start').value = Math.round(zoomKmStart);
    document.getElementById('pkm-end').value   = Math.round(zoomKmEnd);
    draw2D();

    if (isDragging) { isDragging = false; pcanvas.style.cursor = 'default'; }
  });

  var tooltip = document.getElementById('ptrace-tooltip');
  pcanvas.addEventListener('mousemove', function(ev) {
    if (isDragging) { tooltip.style.display = 'none'; return; }

    var mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
    var hit = null;
    for (var i = 0; i < damageDots.length; i++) {
      var d = damageDots[i], dx = mx - d.x, dy = my - d.y;

      tooltip.innerHTML = '<b style="color:' + hit.color + '">Fiber ' + hit.fnum + '</b><br>' + hit.splice_label + '<br><span style="font-size:10px;color:#888">' + hit.text + '</span>';
      tooltip.style.display = 'block';

    } else if (showBDir && Object.keys(pCompositeData).length > 0) {
      // A+B composite hover: show A / B→A / Avg at mouse km
      var prect = pcanvas.getBoundingClientRect();
      var pFullKm = (data && data.meta && data.meta.span_km) || 75;
      var pvKmS = zoomKmStart != null ? zoomKmStart : 0;
      var pvKmE = zoomKmEnd   != null ? zoomKmEnd   : pFullKm;
      var pML = 45, pCW = prect.width - 60;
      var kmAtMouse = pvKmS + (mx - pML) / pCW * (pvKmE - pvKmS);
      var pFibers = [];
      if (currentFiber > 0) { pFibers = [currentFiber]; }
      else if (currentRibbon >= 0 && data) {
        var pRib = data.ribbons[currentRibbon];
        for (var pfi = pRib.f_start; pfi <= pRib.f_end; pfi++) pFibers.push(pfi);
      }
      var rows = '<div style="color:#888;font-size:9px;margin-bottom:2px">' + kmAtMouse.toFixed(2) + ' km</div>';
      var anyHit = false;
      for (var pfi = 0; pfi < pFibers.length; pfi++) {
        var pfnum = pFibers[pfi];
        var pComp = pCompositeData[pfnum];
        if (!pComp || pComp.length === 0) continue;
        var near = null, nearDist = Infinity;
        for (var pci = 0; pci < pComp.length; pci++) {
          var pd = Math.abs(pComp[pci].km - kmAtMouse);
          if (pd < nearDist) { nearDist = pd; near = pComp[pci]; }

        if (!near || nearDist > 1.5) continue;
        anyHit = true;
        var aStr = near.aDb != null ? 'A→B: ' + near.aDb.toFixed(2) : 'A→B: —';
        var bStr = near.bDb != null ? 'B→A: ' + near.bDb.toFixed(2) : 'B→A: —';
        rows += '<div style="margin:1px 0"><b style="color:#1F4E79">F' + pfnum + '</b> &nbsp;'

              + '<span style="color:#c87533">' + bStr + '</span> &nbsp; '
              + '<b>Avg: ' + near.avg.toFixed(2) + ' dB</b></div>';

      if (anyHit) {
        tooltip.innerHTML = rows;
        tooltip.style.display = 'block';
        tooltip.style.left = (mx + 15) + 'px'; tooltip.style.top = (my + 15) + 'px';
      } else { tooltip.style.display = 'none'; }
    } else { tooltip.style.display = 'none'; }
  });
  pcanvas.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });
  window.addEventListener('resize', function() { if (data) draw2D(); });

  // A+B toggle in popup
  document.getElementById('pab-toggle').addEventListener('click', function() {
    showBDir = !showBDir;
    var btn = document.getElementById('pab-toggle');

      btn.style.color = '#c87533';
      btn.style.borderColor = '#c87533';
    }

  });

  if (data && currentRibbon >= 0) draw2D();
});

function syncPopup() {
  if (!popupWin || popupWin.closed) return;
  const label = document.getElementById('chart-info')?.textContent || '';
  // Store state on window so popup can read it directly (works even when postMessage
  // is blocked by Streamlit's iframe sandbox)
  window._popupState = {
    ribbonIdx: currentRibbon, fiberNum: currentFiber,
    zoomStart: zoomKmStart,   zoomEnd:  zoomKmEnd,
    highlightKm, showBDir, label,
  };
  // Direct function call — most reliable from sandboxed iframe
  try { if (popupWin.syncFromOpener) popupWin.syncFromOpener(); } catch(e) {}
  // postMessage as secondary path
  try { popupWin.postMessage({ type: 'sync', ...window._popupState }, '*'); } catch(e) {}
}
